name: 'PFM-Upstream-Sync'

env:
  UPSTREAM_REPO: LibreSpark/LibreTV
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
on:
  schedule:
    - cron: "0 20 * * *" # At UTC 20:00, every day
  workflow_dispatch:  # click the button on Github repo!
    inputs:
      sync_test_mode: # Adds a boolean option that appears during manual workflow run for easy test mode config
        description: 'Fork Sync Test Mode'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # REQUIRED step
      # Step 1: run a standard checkout action, provided by github
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          # optional: set the branch to checkout,
          # sync action checks out your 'target_sync_branch' anyway
          ref: ${{ env.TARGET_BRANCH }}
          # REQUIRED if your upstream repo is private (see wiki)
          persist-credentials: false

      # Step 2: run the sync action
      - name: Sync upstream changes
        id: sync
        uses: PFM-PowerForMe/Fork-Sync-With-Upstream-action@main
        with:
          upstream_sync_repo: ${{ env.UPSTREAM_REPO }}
          upstream_sync_branch: ${{ env.UPSTREAM_BRANCH }}
          target_sync_branch: ${{ env.TARGET_BRANCH }}
          target_repo_token: ${{ secrets.SYNC_TOKEN }} # automatically generated, no need to set
          git_config_pull_rebase: true

          # Set test_mode true to run tests instead of the true action!!
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] Due to a change in the workflow file of the upstream repository, GitHub has automatically suspended the scheduled automatic update. You need to manually sync your fork."
          exit 1
